name: Deploy

# Collaborator pushes to main on GitHub -> the self-hosted runner on the
# ProLiant pulls, builds, and restarts the systemd service in place.
on:
  push:
    branches: [main]
  workflow_dispatch: {} # lets you trigger a deploy manually from the Actions tab

# Never run two deploys at once: a second push waits for the first to finish
# instead of two `npm ci`/build runs fighting over the same directory.
concurrency:
  group: deploy-negocia-cdmx
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull, build & restart
        run: |
          set -euo pipefail
          export PATH="/usr/local/lib/nodejs/node-v22.21.1-linux-x64/bin:$PATH"

          cd /home/developer/negocia-cdmx
          echo "==> Syncing working tree to origin/main"
          git fetch origin main
          git reset --hard origin/main

          echo "==> Installing dependencies"
          npm ci

          echo "==> Building"
          npm run build

          echo "==> Restarting service"
          sudo systemctl restart negocia-cdmx

          echo "==> Done. Current commit:"
          git --no-pager log -1 --oneline
